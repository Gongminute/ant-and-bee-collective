<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="/images/signature_gongmin.png?v=2?v=2">
<title>〇놀이</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asta+Sans:wght@300..800&family=Bagel+Fat+One&family=Dokdo&family=Dongle&family=East+Sea+Dokdo&family=Gaegu&family=Gamja+Flower&family=Gasoek+One&family=Gothic+A1&family=Gowun+Batang&family=Grandiflora+One&family=Gugi&family=Hahmlet:wght@100..900&family=Jua&family=Kirang+Haerang&family=Moirai+One&family=Nanum+Brush+Script&family=Nanum+Gothic&family=Nanum+Gothic+Coding&family=Nanum+Myeongjo&family=Noto+Sans+KR:wght@100..900&family=Noto+Serif+KR:wght@200..900&family=Song+Myung&family=Sunflower:wght@300&family=Yeon+Sung&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css">
    <style>
        :root {
            --header-height: 72px;
        }
        body {
            margin: 0;
            position: relative;
            min-height: 100vh;
            padding-top: var(--header-height);
            box-sizing: border-box;
        }
        body.dragging {
            cursor: col-resize;
            user-select: none;
        }
        body.dragging .content-frame {
            pointer-events: none;
        }
        #title {
            text-decoration: none;
            color: #ffffff;
            display: block;
            min-height: 50px;
            padding: 10px;
        }
        .title-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background-color: #000000;
            z-index: 1000;
        }
        .fixed-line {
            position: absolute;
            bottom: 0px;
            left: 0;
            right: 0;
            margin: 0;
        }
        .section-container {
            display: flex;
            position: relative;
            min-height: calc(100vh - var(--header-height));
            z-index: 1;
        }
        .section-left, .section-right {
            padding: 10px;
            border: none;
            box-sizing: border-box;
        }
        .section-left {
            --bg: #ffffff;
            padding: 16px;
            flex: 0 0 240px;
            min-width: 220px;
        }
        .section-left h2 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 600;
        }
        .link-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .link-list li {
            margin-bottom: 10px;
        }
        .link-list a {
            color: #000000;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        .link-list a:hover {
            border-bottom-color: #000000;
        }
        .child-links {
            padding-left: 16px;
            list-style: none;
            margin: 4px 0 4px 0;
            font-size: 0.9em;
        }
        .child-links li {
            margin-bottom: 6px;
        }
        .child-links a {
            color: #555;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        .child-links a:hover {
            border-bottom-color: #555;
        }
        .section-right {
            padding: 0;
            flex: 1 1 auto;
            min-width: 220px;
        }
        .drag-divider {
            flex: 0 0 12px;
            cursor: col-resize;
            position: relative;
            z-index: 2;
        }
        .drag-divider::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            background: #000000;
            transform: translateX(-0.5px);
        }
        .content-frame {
            display: block;
            width: 100%;
            min-height: calc(100vh - var(--header-height));
            border: none;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div class="title-container">
        <a id="title" href="https://www.instagram.com/gongminute/?hl=en" target="_blank" rel="noreferrer">〇놀이</a>
        <hr class="fixed-line">
    </div>

    <div class="section-container">
        <div class="section-left">
            <ul class="link-list">
                <li><a id="about" href="about.html" target="content-frame">about</a></li>
                <li><a id="writings" href="Writings.html" target="content-frame">writings</a>
                </li>
                <li><a id="collective-home" href="index.html" target="content-frame">ant and bee collective</a></li>
            </ul>
        </div>
        <div class="drag-divider" id="drag-divider" aria-label="Resize panels" role="separator"></div>
        <div class="section-right">
            <iframe
                class="content-frame"
                name="content-frame"
                src="about:blank"
                title="Linked content panel"
            ></iframe>
        </div>
    </div>

    <script>
        const collectiveHomeTranslations = [
            '창작집단 개미와 꿀벌', // Korean
            'Colectivo de Hormiga y Abeja', // Spanish
            'Collectif Fourmi et Abeille', // French
            'Ameise und Biene Kollektiv', // German
            'アリと蜂の集団', // Japanese
            '蚂蚁和蜜蜂集体', // Chinese
            'Collettivo Formica e Ape', // Italian
            'Coletivo Formiga e Abelha', // Portuguese
            'Коллектив Муравья и Пчелы', // Russian
            'مجموعة النملة والنحلة', // Arabic
            'चींटी और मधुमक्खी समूह', // Hindi
            'Maur og Bi Kollektiv', // Norwegian
            'مجموعه مورچه و زنبور', // Farsi
            'กลุ่มมดและผึ้ง', // Thai
            'Шоргоолж ба Зөгийний Цугларалт', // Mongolian
            'कमिला र भमराको समूह', // Nepali
            'ပုရွက်နှင့် လူးကောင်အဖွဲ့', // Burmese
            'ក្រុមខ្យងនិងឃ្លោក', // Khmer
            'Tập thể Kiến và Ong' // Vietnamese
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function attachCyclingTranslations(id, originalText, translationList) {
            const element = document.getElementById(id);
            if (!element) {
                return;
            }

            let navIntervalId;

            element.addEventListener('mouseenter', function() {
                const shuffled = [...translationList];
                shuffleArray(shuffled);
                let index = 0;
                element.textContent = shuffled[index];

                navIntervalId = setInterval(() => {
                    index = (index + 1) % shuffled.length;
                    element.textContent = shuffled[index];
                }, 800);
            });

            element.addEventListener('mouseleave', function() {
                clearInterval(navIntervalId);
                element.textContent = originalText;
            });
        }

        // Hover translation remains enabled only for the collective home category.
        attachCyclingTranslations('collective-home', 'ant and bee collective', collectiveHomeTranslations);

        const sectionContainer = document.querySelector('.section-container');
        const leftPanel = document.querySelector('.section-left');
        const dragDivider = document.getElementById('drag-divider');
        let dragging = false;

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function onDrag(event) {
            if (!dragging) {
                return;
            }

            const rect = sectionContainer.getBoundingClientRect();
            const dividerWidth = dragDivider.offsetWidth;
            const minPanelWidth = 220;
            const maxLeft = rect.width - minPanelWidth - dividerWidth;

            const proposedLeftWidth = event.clientX - rect.left - dividerWidth / 2;
            const nextLeftWidth = clamp(proposedLeftWidth, minPanelWidth, maxLeft);

            leftPanel.style.flexBasis = `${nextLeftWidth}px`;
        }

        function stopDrag() {
            dragging = false;
            document.body.classList.remove('dragging');
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        dragDivider.addEventListener('mousedown', function(event) {
            event.preventDefault();
            dragging = true;
            document.body.classList.add('dragging');
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        });
    </script>
</body>
</html>
